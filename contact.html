<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="株式会社NEXT Bridgeへのお問い合わせページです。サービスに関するご質問やお見積もりのご依頼はこちらからどうぞ。">
  <title>お問い合わせ | 株式会社NEXT Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <a href="index.html">
          <img src="images/logo.png" alt="NEXT Bridge">
        </a>
      </div>
      <input type="checkbox" id="menu-toggle" class="menu-toggle">
      <label for="menu-toggle" class="menu-icon"><span></span></label>
      <label for="menu-toggle" class="nav-overlay"></label>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="index.html">ホーム</a></li>
          <li><a href="about.html">会社概要</a></li>
          <li><a href="services.html">サービス</a></li>
          <li><a href="contact.html" class="nav-contact">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>お問い合わせ</h1>
      <p>Contact</p>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="section">
    <div class="container">
      <div class="section-title">
        <h2>お問い合わせフォーム</h2>
        <p>下記フォームにご記入のうえ、送信ボタンを押してください</p>
      </div>

      <form class="contact-form" action="https://formspree.io/f/myknjqar" method="POST">
        <div class="form-group">
          <label for="company">会社名</label>
          <input type="text" id="company" name="company" placeholder="例：株式会社サンプル">
        </div>

        <div class="form-group">
          <label for="name">お名前 <span class="required">※必須</span></label>
          <input type="text" id="name" name="name" required placeholder="例：山田 太郎">
        </div>

        <div class="form-group">
          <label for="email">メールアドレス <span class="required">※必須</span></label>
          <input type="email" id="email" name="email" required placeholder="例：info@example.com">
        </div>

        <div class="form-group">
          <label for="phone">電話番号</label>
          <input type="tel" id="phone" name="phone" placeholder="例：03-1234-5678">
        </div>

        <div class="form-group">
          <label for="subject">お問い合わせ種別 <span class="required">※必須</span></label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>選択してください</option>
            <option value="サービスに関するご質問">サービスに関するご質問</option>
            <option value="お見積もりのご依頼">お見積もりのご依頼</option>
            <option value="採用に関するお問い合わせ">採用に関するお問い合わせ</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">お問い合わせ内容 <span class="required">※必須</span></label>
          <textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn btn-primary">送信する</button>
        </div>
      </form>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-company">
          <div class="footer-logo">NEXT Bridge</div>
          <p>〒104-0061<br>東京都中央区銀座1-12-4<br>N&amp;E BLD.7階</p>
        </div>
        <div class="footer-nav">
          <h4>メニュー</h4>
          <ul>
            <li><a href="index.html">ホーム</a></li>
            <li><a href="about.html">会社概要</a></li>
            <li><a href="services.html">サービス</a></li>
            <li><a href="contact.html">お問い合わせ</a></li>
          </ul>
        </div>
        <div class="footer-contact">
          <h4>お問い合わせ</h4>
          <p>Mail: <a href="mailto:contact@nextb.net">contact@nextb.net</a></p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 NEXT Bridge All Rights Reserved.</p>
      </div>
    </div>
  </footer>

</body>
</html>
